services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medapp
      POSTGRES_PASSWORD: medapp
      POSTGRES_DB: medapp
    ports:
      - "5432:5432"
    volumes:
      - medapp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medapp -d medapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://medapp:medapp@db:5432/medapp
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-min-32-chars!!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      SEED_DOCTOR_EMAIL: ${SEED_DOCTOR_EMAIL:-doctor@example.com}
      SEED_DOCTOR_PASSWORD: ${SEED_DOCTOR_PASSWORD:-ChangeMe123!}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  medapp_pg:
